<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="./index.js"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <main class="flex min-h-screen items-center justify-center px-4 py-10">
      <section class="w-full max-w-lg">
        <div class="mb-8 text-center">
          <h1
            class="text-3xl font-semibold tracking-tight text-white sm:text-4xl"
          >
            URL Shortener
          </h1>
          <p class="mt-3 text-sm leading-6 text-slate-400 sm:text-base">
            Cole uma URL longa e visualize como ficaria seu link encurtado.
          </p>
        </div>

        <div
          class="rounded-lg border border-white/10 bg-white/[0.06] p-5 shadow-2xl shadow-black/30 backdrop-blur sm:p-6"
        >
          <form class="space-y-4">
            <label for="url" class="block text-sm font-medium text-slate-200">
              URL original
            </label>
            <div class="flex flex-col gap-3 sm:flex-row">
              <input
                id="url"
                name="url"
                type="url"
                placeholder="https://exemplo.com"
                class="min-h-12 flex-1 rounded-md border border-white/10 bg-slate-900/80 px-4 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20"
              />
              <button
                type="button"
                id="shortener-btn"
                class="min-h-12 rounded-md bg-cyan-400 px-5 text-sm font-semibold text-slate-950 transition hover:bg-cyan-300 focus:outline-none focus:ring-2 focus:ring-cyan-300 focus:ring-offset-2 focus:ring-offset-slate-950"
              >
                Encurtar URL
              </button>
            </div>
          </form>

          <div
            class="mt-6 rounded-md border border-dashed border-white/15 bg-slate-900/60 p-4"
          >
            <p
              class="text-xs font-medium uppercase tracking-wide text-slate-500"
            >
              Resultado
            </p>
            <div
              class="mt-3 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"
            >
              <span
                id="result"
                class="break-all text-sm font-medium text-cyan-300"
              >
                Aguardando uma URL...
              </span>
              <button
                type="button"
                id="redirect-btn"
                disabled
                class="min-h-10 rounded-md border border-white/10 px-4 text-sm font-semibold text-slate-300 transition hover:border-cyan-300 hover:text-cyan-200 focus:outline-none focus:ring-2 focus:ring-cyan-300/40 disabled:cursor-not-allowed disabled:opacity-40 disabled:hover:border-white/10 disabled:hover:text-slate-300"
              >
                Abrir URL
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
