<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar | URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <main class="flex min-h-screen items-center justify-center px-4 py-10">
      <section
        class="grid w-full max-w-5xl gap-8 lg:grid-cols-[0.95fr_1.05fr] lg:items-center"
      >
        <div class="space-y-6">
          <a
            href="./index.html"
            class="inline-flex min-h-10 items-center rounded-md border border-white/10 px-4 text-sm font-semibold text-slate-300 transition hover:border-cyan-300 hover:text-cyan-200 focus:outline-none focus:ring-2 focus:ring-cyan-300/40"
          >
            URL Shortener
          </a>

          <div>
            <p
              class="text-sm font-medium uppercase tracking-[0.18em] text-cyan-300"
            >
              Área de acesso
            </p>
            <h1
              class="mt-4 text-4xl font-semibold tracking-tight text-white sm:text-5xl"
            >
              Crie sua conta e gerencie seus links.
            </h1>
            <p class="mt-5 max-w-xl text-base leading-7 text-slate-400">
              Use seu email, nome e senha para registrar um usuário ou entrar em
              uma conta existente.
            </p>
          </div>

          <div class="grid gap-3 sm:grid-cols-3">
            <div class="rounded-lg border border-white/10 bg-white/[0.05] p-4">
              <p class="text-2xl font-semibold text-white">1</p>
              <p class="mt-2 text-sm text-slate-400">Conta por email único</p>
            </div>
            <div class="rounded-lg border border-white/10 bg-white/[0.05] p-4">
              <p class="text-2xl font-semibold text-white">7d</p>
              <p class="mt-2 text-sm text-slate-400">Sessão com token JWT</p>
            </div>
            <div class="rounded-lg border border-white/10 bg-white/[0.05] p-4">
              <p class="text-2xl font-semibold text-white">URL</p>
              <p class="mt-2 text-sm text-slate-400">Links em um só lugar</p>
            </div>
          </div>
        </div>

        <div
          class="rounded-lg border border-white/10 bg-white/[0.06] p-5 shadow-2xl shadow-black/30 backdrop-blur sm:p-6"
        >
          <div
            class="mb-6 grid grid-cols-2 rounded-md border border-white/10 bg-slate-900/70 p-1"
          >
            <button
              type="button"
              id="register-tab"
              class="min-h-11 rounded text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-cyan-300/40"
              aria-pressed="true"
            >
              Registro
            </button>
            <button
              type="button"
              id="login-tab"
              class="min-h-11 rounded text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-cyan-300/40"
              aria-pressed="false"
            >
              Login
            </button>
          </div>

          <form id="auth-form" class="space-y-5">
            <div id="name-field">
              <label
                for="name"
                class="block text-sm font-medium text-slate-200"
              >
                Nome
              </label>
              <input
                id="name"
                name="name"
                type="text"
                autocomplete="name"
                placeholder="Seu nome"
                class="mt-2 min-h-12 w-full rounded-md border border-white/10 bg-slate-900/80 px-4 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20"
              />
            </div>

            <div>
              <label
                for="email"
                class="block text-sm font-medium text-slate-200"
              >
                Email
              </label>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="voce@email.com"
                required
                class="mt-2 min-h-12 w-full rounded-md border border-white/10 bg-slate-900/80 px-4 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20"
              />
            </div>

            <div>
              <label
                for="password"
                class="block text-sm font-medium text-slate-200"
              >
                Senha
              </label>
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Digite sua senha"
                required
                minlength="6"
                class="mt-2 min-h-12 w-full rounded-md border border-white/10 bg-slate-900/80 px-4 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20"
              />
            </div>

            <button
              type="submit"
              id="submit-btn"
              class="min-h-12 w-full rounded-md bg-cyan-400 px-5 text-sm font-semibold text-slate-950 transition hover:bg-cyan-300 focus:outline-none focus:ring-2 focus:ring-cyan-300 focus:ring-offset-2 focus:ring-offset-slate-950 disabled:cursor-not-allowed disabled:opacity-60"
            >
              Criar conta
            </button>
          </form>

          <div
            class="mt-5 rounded-md border border-dashed border-white/15 bg-slate-900/60 p-4"
          >
            <p
              class="text-xs font-medium uppercase tracking-wide text-slate-500"
            >
              Status
            </p>
            <p
              id="message"
              class="mt-2 break-words text-sm font-medium text-slate-300"
            >
              Preencha os dados para continuar.
            </p>
          </div>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById('auth-form');
      const nameField = document.getElementById('name-field');
      const nameInput = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const registerTab = document.getElementById('register-tab');
      const loginTab = document.getElementById('login-tab');
      const submitBtn = document.getElementById('submit-btn');
      const message = document.getElementById('message');

      let mode = 'register';

      function setMode(nextMode) {
        mode = nextMode;
        const isRegister = mode === 'register';

        nameField.classList.toggle('hidden', !isRegister);
        nameInput.required = isRegister;
        nameInput.disabled = !isRegister;
        passwordInput.autocomplete = isRegister
          ? 'new-password'
          : 'current-password';
        submitBtn.textContent = isRegister ? 'Criar conta' : 'Entrar';
        message.textContent = isRegister
          ? 'Preencha os dados para criar sua conta.'
          : 'Informe email e senha para acessar sua conta.';

        registerTab.setAttribute('aria-pressed', String(isRegister));
        loginTab.setAttribute('aria-pressed', String(!isRegister));
        registerTab.className = tabClass(isRegister);
        loginTab.className = tabClass(!isRegister);
      }

      function tabClass(active) {
        const base =
          'min-h-11 rounded text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-cyan-300/40';
        return active
          ? `${base} bg-cyan-400 text-slate-950 shadow-lg shadow-cyan-950/30`
          : `${base} text-slate-400 hover:text-slate-100`;
      }

      registerTab.addEventListener('click', () => setMode('register'));
      loginTab.addEventListener('click', () => setMode('login'));

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const isRegister = mode === 'register';
        const payload = {
          email: emailInput.value.trim(),
          password: passwordInput.value,
        };

        if (isRegister) {
          payload.name = nameInput.value.trim();
        }

        submitBtn.disabled = true;
        message.textContent = isRegister ? 'Criando conta...' : 'Entrando...';

        try {
          const response = await fetch(
            isRegister ? '/api/auth/signup' : '/api/auth/signin',
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              credentials: 'same-origin',
              body: JSON.stringify(payload),
            }
          );

          const data = await response.json();

          if (!response.ok) {
            throw new Error(
              data.message || 'Não foi possível concluir a ação.'
            );
          }

          message.textContent = isRegister
            ? 'Conta criada com sucesso.'
            : 'Login realizado com sucesso.';

          if (message.textContent.trim().includes("Login")) {
            open("/shortener/create");
          }
        } catch (err) {
          message.textContent = err.message;
        } finally {
          submitBtn.disabled = false;
        }
      });

      setMode('register');
    </script>
  </body>
</html>
